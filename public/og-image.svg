<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#164e63;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="ballGrad" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative Elements -->
  <circle cx="150" cy="100" r="60" fill="#06b6d4" opacity="0.1"/>
  <circle cx="1050" cy="530" r="80" fill="#9333ea" opacity="0.1"/>
  <circle cx="950" cy="150" r="40" fill="#ec4899" opacity="0.08"/>
  
  <!-- Main Pinball Balls -->
  <circle cx="200" cy="400" r="45" fill="url(#ballGrad)" filter="url(#glow)"/>
  <circle cx="185" cy="385" r="12" fill="#ffffff" opacity="0.6"/>
  
  <circle cx="320" cy="480" r="38" fill="#ec4899" filter="url(#glow)"/>
  <circle cx="308" cy="470" r="10" fill="#ffffff" opacity="0.5"/>
  
  <circle cx="150" cy="520" r="32" fill="#9333ea" filter="url(#glow)"/>
  <circle cx="140" cy="512" r="8" fill="#ffffff" opacity="0.5"/>
  
  <circle cx="1000" cy="350" r="42" fill="#10b981" filter="url(#glow)"/>
  <circle cx="988" cy="338" r="11" fill="#ffffff" opacity="0.5"/>
  
  <!-- Motion Trails -->
  <path d="M 100 350 Q 150 320, 200 355" stroke="#06b6d4" stroke-width="3" fill="none" opacity="0.3" stroke-dasharray="5,5"/>
  <path d="M 250 430 Q 290 450, 320 480" stroke="#ec4899" stroke-width="3" fill="none" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Title -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="96" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)">
    SpinSnap
  </text>
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="96" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)">
    Arcade
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle">
    물리 엔진 기반 인터랙티브 게임
  </text>
  
  <!-- Game Icons Row -->
  <g transform="translate(380, 440)">
    <!-- Plinko -->
    <circle cx="0" cy="0" r="25" fill="#0891b2" opacity="0.2"/>
    <rect x="-8" y="-8" width="16" height="16" fill="#06b6d4" opacity="0.8"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">플링코</text>
  </g>
  
  <g transform="translate(520, 440)">
    <!-- Race -->
    <circle cx="0" cy="0" r="25" fill="#059669" opacity="0.2"/>
    <polygon points="0,-10 8,10 -8,10" fill="#10b981" opacity="0.8"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">레이스</text>
  </g>
  
  <g transform="translate(660, 440)">
    <!-- Survival -->
    <circle cx="0" cy="0" r="25" fill="#7c3aed" opacity="0.2"/>
    <circle cx="0" cy="0" r="8" fill="#9333ea" opacity="0.8"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#9333ea" stroke-width="2" opacity="0.6"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">서바이벌</text>
  </g>
  
  <g transform="translate(820, 440)">
    <!-- Color -->
    <circle cx="0" cy="0" r="25" fill="#db2777" opacity="0.2"/>
    <circle cx="-6" cy="-6" r="5" fill="#ec4899" opacity="0.8"/>
    <circle cx="6" cy="-6" r="5" fill="#f472b6" opacity="0.8"/>
    <circle cx="0" cy="6" r="5" fill="#fbbf24" opacity="0.8"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">컬러</text>
  </g>
</svg>

