<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- Main Ball (Pinball) -->
  <circle cx="50" cy="50" r="20" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="45" cy="45" r="5" fill="#ffffff" opacity="0.6"/>
  
  <!-- Motion Trail -->
  <circle cx="35" cy="35" r="8" fill="#06b6d4" opacity="0.4"/>
  <circle cx="25" cy="25" r="5" fill="#9333ea" opacity="0.2"/>
  
  <!-- Spin Effect Lines -->
  <path d="M 70 50 Q 75 40, 80 50" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 70 50 Q 75 60, 80 50" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.6"/>
</svg>

